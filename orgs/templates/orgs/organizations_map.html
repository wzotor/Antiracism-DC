{% extends "base.html" %}

{% load static %}
{% block extra_head %}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h4 mb-1">Organizations Map</h1>
      <div class="text-muted small">Click a marker to view organization details.</div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="{% url 'organizations_list' %}">Back to Table</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div id="map" style="height: 70vh; width: 100%;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const map = L.map("map");
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    const points = [
      {% for org in organizations %}
        {
          organization_id: "{{ org.organization_id|default:''|escapejs }}",
          name: "{{ org.organization_name|default:''|escapejs }}",
          type: "{{ org.organization_type|default:''|escapejs }}",
          address: "{{ org.address|default:''|escapejs }}",
          ward: "{{ org.ward|default:''|escapejs }}",
          activities: "{{ org.core_organizational_activities|default:''|escapejs }}",
          website: "{{ org.website|default:''|escapejs }}",
          lat: parseFloat("{{ org.latitude|default:'' }}"),
          lng: parseFloat("{{ org.longitude|default:'' }}")
        },
      {% endfor %}
    ];

    const bounds = [];

    function safeLink(url) {
      if (!url) return "";
      const trimmed = String(url).trim();
      if (!trimmed) return "";
      if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) return trimmed;
      return "https://" + trimmed;
    }

    for (const p of points) {
      if (!Number.isFinite(p.lat) || !Number.isFinite(p.lng)) continue;

      const websiteUrl = safeLink(p.website);
      const googleMapsUrl = `https://www.google.com/maps?q=${encodeURIComponent(p.lat + "," + p.lng)}`;

      const popup = `
        <div style="min-width: 260px;">
          <div style="font-weight: 700; margin-bottom: 4px;">${p.name || "Unknown organization"}</div>

          ${p.type ? `<div style="font-size: 13px; margin-bottom: 4px;"><strong>Type:</strong> ${p.type}</div>` : ""}

          ${p.address ? `<div style="font-size: 13px; margin-bottom: 4px;"><strong>Address:</strong> ${p.address}</div>` : ""}

          ${p.activities ? `<div style="font-size: 13px; margin-bottom: 8px;"><strong>Core activities:</strong> ${p.activities}</div>` : ""}

          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            ${websiteUrl ? `<a href="${websiteUrl}" target="_blank" rel="noopener noreferrer">Website</a>` : `<span style="color:#666;">No website</span>`}
            <a href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>
          </div>
        </div>
      `;

      L.marker([p.lat, p.lng]).addTo(map).bindPopup(popup);
      bounds.push([p.lat, p.lng]);
    }

    if (bounds.length) {
      map.fitBounds(bounds, { padding: [20, 20] });
    } else {
      map.setView([38.9072, -77.0369], 12);
    }

    // DC boundary outline
    fetch("{% static 'geo/dc_boundary.geojson' %}")
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          style: {
            fillOpacity: 0,
            weight: 3,
            color: "#1a1a2e",
            opacity: 0.75,
            interactive: false,
          }
        }).addTo(map).bringToFront();
      });
  });
</script>
{% endblock %}
